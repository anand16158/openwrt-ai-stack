config daemon 'main'
	option interface 'br-lan'
	option model '/etc/traffic-classifier/model.json'
	option max_flows '8192'

	# QoS: DSCP marking via nftables
	option qos_enabled '0'

	# Telemetry: periodic JSON export for uCentral/dashboards
	option telemetry_enabled '0'
	option telemetry_interval '60'
	option telemetry_path '/tmp/traffic-classifier-telemetry.json'

	# Data Capture: record labeled flows for ML retraining
	option data_capture_enabled '1'
	option data_capture_path '/tmp/tc-training-data.csv'
